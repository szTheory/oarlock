# CI gate for pushes to main and pull requests.
# Runs format check, compile (warnings-as-errors), test suite, and
# unused-deps check. Mirrors the bar enforced by publish-hex but
# without HEX_API_KEY (no publish here, just verification).

name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: mix test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: erlef/setup-beam@fc68ffb90438ef2936bbb3251622353b3dcb2f93 # v1.24.0
        with:
          version-file: .tool-versions
          version-type: strict

      - name: Cache library deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-library-${{ hashFiles('mix.lock') }}

      - name: Install Hex + Rebar
        run: |
          mix local.hex --force
          mix local.rebar --force

      - name: Fetch library deps
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Check unused deps
        run: mix deps.unlock --check-unused

      - name: Compile (warnings as errors)
        run: mix compile --warnings-as-errors

      - name: Run tests
        env:
          MIX_ENV: test
        run: mix test
